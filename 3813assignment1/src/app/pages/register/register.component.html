<div class="container mt-4">
  <h2>Register</h2>

  <div class="mb-3">
    <label class="form-label">Username</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="username"
      name="username"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Birthdate</label>
    <input
      type="date"
      class="form-control"
      [(ngModel)]="birthdate"
      name="birthdate"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Age</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="age"
      name="age"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input
      type="email"
      class="form-control"
      [(ngModel)]="email"
      name="email"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <input
      type="password"
      class="form-control"
      [(ngModel)]="password"
      name="password"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <input
      type="password"
      class="form-control"
      [(ngModel)]="confirmPassword"
      name="confirmPassword"
      required
    />
  </div>

  <button class="btn btn-primary me-2" (click)="register()">Submit</button>
  <a routerLink="/login" class="btn btn-secondary">Back to Login</a>

  <div class="alert alert-danger mt-3" *ngIf="errorMsg">
    {{ errorMsg }}
  </div>
</div>
