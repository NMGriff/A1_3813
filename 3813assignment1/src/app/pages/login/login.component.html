<div class="container mt-4">
  <h2>Login</h2>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input
      type="email"
      class="form-control"
      [(ngModel)]="email"
      name="email"
      placeholder="admin1@gmail.com"
      required
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <input
      type="password"
      class="form-control"
      [(ngModel)]="password"
      name="password"
      placeholder="123"
      required
    />
  </div>

  <button class="btn btn-primary" (click)="login()">Submit</button>

  <div class="alert alert-danger mt-3" *ngIf="errorMsg">
    {{ errorMsg }}
  </div>
</div>
